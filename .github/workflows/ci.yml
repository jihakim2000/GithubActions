name: 'Run App'

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: windows-latest  # Ensure we're using a Windows runner for .NET Framework

    steps:
      - name: Check out code
        uses: actions/checkout@v2

      - name: Set up .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '5.0.301'  # Adjust to your specific .NET version

      - name: NuGet Restore
        run: nuget restore GithubActions.sln

      - name: Restore dependencies
        run: dotnet restore GithubActions.sln

      - name: Build
        run: dotnet build --configuration Release

      - name: Run Unit Tests
        run: dotnet test --no-build --verbosity normal
